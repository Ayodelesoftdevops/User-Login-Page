<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Login Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
    <nav>
    <img src="Images\Devops Academy Logo.png" alt="logo design">
    <ul>
        <li><a href="">Home</a></li>
        <li><a href="">SignUp</a></li>
        <li><a href="">Login</a></li>
        <li><a href="">Register</a></li>
    </ul>
    </nav>

<form id="myform">
    <span id="welcome">Welcome Back</span>
    <label for="username">Username</label><br>
    <input type="text" id="username" name="username">
    <span id="usernameError"></span>
    <br><br>
    <label for="password">Password</label><br>
    <input type="password" id="password" name="password">
    <span id="passwordError"></span>
    <br><br>
    <button type="submit">Login</button>
    <div class="forgot">
        <span class="one"><a href="">Forgot Password?</a></span>
        <span class="one"><a href="">Register</a></span>
    </div>
</form>
</div>
<script src="script.js"></script>
</body>
</html>
